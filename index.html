<style>
body{

    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.tabs{
    display:flex;
    gap:10px;
    padding:10px;
}

.tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e40af;
    color:white;
    font-weight:bold;
}

.tabs button.active{

}

.workout{
    display:none;

}

.workout.active{
    display:block;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

h3{
    color:#60a5fa;
}

.exercise{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
}

.done{
    text-decoration:line-through;
    opacity:0.5;
}

.timer{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#3b82f6;
    padding:15px;
    border-radius:50%;
    font-weight:bold;
}
</style>
</head>

<script>

]
}

};

function render(){
    Object.keys(treinos).forEach(dia=>{
        let html="";
        Object.keys(treinos[dia]).forEach(grupo=>{
            html+=`<div class="card"><h3>${grupo}</h3>`;
            treinos[dia][grupo].forEach((ex,i)=>{
                let key=dia+grupo+i;
                let done=localStorage.getItem(key)=="1"?"done":"";
                html+=`
                <div class="exercise ${done}" onclick="toggle('${key}',this)">
                    <span>${ex[0]}</span>
                    <span>${ex[1]}</span>
                </div>`;
            });
            html+="</div>";
        });
        document.getElementById(dia).innerHTML=html;
    });
}

function toggle(key,el){
    el.classList.toggle("done");
    localStorage.setItem(key, el.classList.contains("done")?1:0);
}

function show(dia,btn){
    document.querySelectorAll('.workout').forEach(e=>e.classList.remove('active'));
    document.getElementById(dia).classList.add('active');

    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

let t=0,rodando=false;

function timer(){
    if(rodando)return;
    rodando=true;
    t=90;

    let i=setInterval(()=>{
        document.querySelector('.timer').innerText=t;
        if(t<=0){
            clearInterval(i);
            rodando=false;
            document.querySelector('.timer').innerText="⏱️";
        }
        t--;
    },1000);
}

render();

</script>
